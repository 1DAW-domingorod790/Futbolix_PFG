services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: futbolix_app
    restart: unless-stopped
    working_dir: /var/www/html
    command: sh -c "chown -R www-data:www-data storage bootstrap/cache && php-fpm"
    volumes:
      - ./:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/node_modules
    depends_on:
      db:
        condition: service_started
      vite:
        condition: service_healthy
    networks:
      - futbolix_network

  nginx:
    image: nginx:alpine
    container_name: futbolix_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www/html
      - ./.docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - futbolix_network

  db:
    image: mariadb:11
    container_name: futbolix_db
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: futbolix
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: futbolix
      MYSQL_PASSWORD: futbolix
    volumes:
      - futbolix_db_data:/var/lib/mysql
    networks:
      - futbolix_network

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: futbolix_phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: futbolix
      PMA_PASSWORD: futbolix
    depends_on:
      - db
    networks:
      - futbolix_network

  vite:
    image: node:22-alpine
    container_name: futbolix_vite
    working_dir: /var/www/html
    command: sh -c "rm -rf public/build public/hot && npm install && npm run build && rm -f public/hot && tail -f /dev/null"
    ports:
      - "5173:5173"
    volumes:
      - ./:/var/www/html
      - /var/www/html/node_modules
    healthcheck:
      test: ["CMD", "test", "-f", "public/build/manifest.json"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - futbolix_network

volumes:
  futbolix_db_data:

networks:
  futbolix_network:
    driver: bridge
